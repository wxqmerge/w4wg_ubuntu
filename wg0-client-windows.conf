# WireGuard Client Configuration for Windows
# Copy this to your Windows machine after running the server setup script

# ============================================
# WireGuard Client Config for Windows
# ============================================
# Save this as: C:\Program Files\WireGuard\wg0-client.conf

[Interface]
Address = 10.200.0.2/24
# Replace with the client private key generated by the server script
PrivateKey = REPLACE_WITH_CLIENT_PRIVATE_KEY
DNS = 8.8.8.8

[Peer]
# Replace with the server public key
PublicKey = REPLACE_WITH_SERVER_PUBLIC_KEY
# Replace with your Ubuntu server's public IP address
Endpoint = <SERVER_PUBLIC_IP>:51820
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 21
