# WireGuard Server Configuration for Ubuntu
# This file belongs on the Ubuntu server

[Interface]
# Server settings
Address = 10.200.0.1/24
ListenPort = 51820
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
SaveConfig = false

[Peer]
# Windows Client
# Replace with client's public key
# Replace with client's desired IP (10.200.0.x)
# PublicKey = REPLACE_WITH_CLIENT_PUBLIC_KEY
# AllowedIPs = 10.200.0.2/32
