# WireGuard Server Configuration for Ubuntu
# This file belongs on the Ubuntu server
# Port is set dynamically by setup-wg-server.sh

[Interface]
# Server settings
Address = 10.200.0.1/24
ListenPort = <PORT>
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
PostUp = ufw route allow in on wg0 out on eth0; ufw route allow in on eth0 out on wg0; ufw allow in on wg0
PostDown = ufw route deny in on wg0 out on eth0; ufw route deny in on eth0 out on wg0
SaveConfig = false

[Peer]
# Windows Client
# Replace with client's public key
# Replace with client's desired IP (10.200.0.x)
# PublicKey = REPLACE_WITH_CLIENT_PUBLIC_KEY
# AllowedIPs = 10.200.0.2/32
